# ============================================================
# .github/workflows/ci.yml — CI/CD Pipeline
# ============================================================
#
# WHAT IS CI/CD?
#   CI = Continuous Integration
#     → Every time you push code to GitHub, this runs automatically.
#     → It installs your package, runs all tests, and reports PASS/FAIL.
#     → Catches bugs BEFORE they enter the main codebase.
#
#   CD = Continuous Deployment (not active here yet — added in Phase 9)
#     → After CI passes, automatically deploy/publish the package.
#
# HOW TO SEE RESULTS:
#   → Go to your GitHub repo → click "Actions" tab
#   → See green ✅ (all tests pass) or red ❌ (something broke)
#
# WHEN DOES THIS RUN?
#   → On every push to any branch
#   → On every Pull Request targeting main
# ============================================================

name: CI — Tests & Code Quality

on:
  push:
    branches: ["**"]          # run on every branch push
  pull_request:
    branches: [main]          # run on PRs targeting main

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Run unit tests
  # ──────────────────────────────────────────────────────────
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]   # test on 3 Python versions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Downloads your repo code onto the CI runner machine

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"         # cache pip packages = faster runs

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"     # installs mlzero + pytest (from setup.py extras)
          pip install pyyaml          # needed for demo scripts

      - name: Run all tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --color=yes
        # -v        = verbose (show each test name)
        # --tb=short = short traceback on failure
        # --color   = colored output in GitHub Actions logs

      - name: Show test summary
        if: always()   # run even if tests fail
        run: |
          echo "Tests completed for Python ${{ matrix.python-version }}"

  # ──────────────────────────────────────────────────────────
  # JOB 2: Verify package installs cleanly
  # ──────────────────────────────────────────────────────────
  install-check:
    name: Package Install Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and verify imports
        run: |
          pip install -e .
          pip install pyyaml
          python -c "
          from mlzero.core.base import BaseModel
          from mlzero.core.losses import mse, binary_cross_entropy
          from mlzero.core.metrics import r2_score, accuracy
          from mlzero.core.optimizers import GradientDescent, Adam
          from mlzero.supervised.regression.linear import LinearRegression
          print('All imports successful')
          print(f'mlzero version: $(python -c \"import mlzero; print(mlzero.__version__)\")')
          "
